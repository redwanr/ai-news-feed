name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test
        run: |
          if [ -f pyproject.toml ]; then
            pip install -e . pytest
            pytest -q
          else
            echo "scaffold not present yet — skipping"
          fi
